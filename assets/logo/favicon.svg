<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FS ENG favicon">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fd6d9"/>
      <stop offset="100%" stop-color="#55bfc3"/>
    </linearGradient>
  </defs>

  

  <!-- engrenagem -->
  <g transform="translate(32 32) scale(1.1)">
    <g fill="url(#tealGrad)">
      <rect x="-3" y="-25" width="6" height="8" rx="2"/>
      <rect x="-3" y="17" width="6" height="8" rx="2"/>
      <rect x="17" y="-3" width="8" height="6" rx="2"/>
      <rect x="-25" y="-3" width="8" height="6" rx="2"/>

      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(45)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(90)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(135)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(180)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(225)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(270)"/>
      <rect x="-3" y="-25" width="6" height="8" rx="2" transform="rotate(315)"/>
    </g>

    <circle r="18" fill="#ffffff" stroke="#55bfc3" stroke-width="3"/>
    <circle r="12" fill="#ffffff" stroke="#24384c" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- chaves -->
    <path d="M-21 -10 C-26 -10 -26 -5 -26 -2 C-26 1 -27 3 -30 4 C-27 5 -26 7 -26 10 C-26 13 -26 18 -21 18"
          fill="none" stroke="#24384c" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M21 -10 C26 -10 26 -5 26 -2 C26 1 27 3 30 4 C27 5 26 7 26 10 C26 13 26 18 21 18"
          fill="none" stroke="#24384c" stroke-width="3.2" stroke-linecap="round"/>

    <!-- S central -->
    <text x="0" y="5"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="15"
          font-weight="700"
          fill="#ff8c32">S</text>
  </g>
</svg>